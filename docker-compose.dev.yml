services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - go_mod:/go/pkg/mod
    environment:
      - ADDR=:8080
      - GITHUB_USER=ghassenelkamel
      # - GITHUB_TOKEN=...
      # - CONTACT_FORWARD_URL=...
    ports:
      - "8080:8080"

  web:
    image: oven/bun:1.3.6
    working_dir: /app
    volumes:
      - ./frontend:/app
      - bun_cache:/root/.bun
    environment:
      - VITE_API_PROXY_TARGET=http://api:8080
    command: sh -lc "bun install --frozen-lockfile && bun run dev"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  bun_cache:
  go_mod:
