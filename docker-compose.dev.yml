services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - go_mod:/go/pkg/mod
    environment:
      - ADDR=:8080
      - LOG_LEVEL=info
      - GITHUB_USER=ghassenelkamel
      - CONTENT_REPO_OWNER=ghassenelkamel
      - CONTENT_REPO_NAME=portfolio-content
      - CONTENT_REPO_REF=main
      - CONTENT_REPO_DIR=content
      - CONTENT_CACHE_TTL=300
      # - GITHUB_TOKEN=...
      # - CONTACT_FORWARD_URL=...
      # - SMTP_HOST=...
      # - SMTP_PORT=587
      # - SMTP_USER=...
      # - SMTP_PASS=...
      # - SMTP_FROM=no-reply@example.com
      # - SMTP_TO=you@example.com
      # - SMTP_REQUIRE_TLS=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "8080:8080"

  web:
    image: oven/bun:1.3.6
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - bun_cache:/root/.bun
    environment:
      - VITE_API_PROXY_TARGET=http://api:8080
    command: sh -lc "bun install --frozen-lockfile && bun run dev"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  bun_cache:
  go_mod:
